name: Drop Score Pipeline

on:
  push:
    branches: [main, claude/add-file-upload-9O4en]
  workflow_dispatch:
    inputs:
      skip_validate:
        description: 'Skip validation (run model directly)'
        type: boolean
        default: false

permissions:
  contents: write

env:
  SIMFIN_KEY: ${{ secrets.SIMFIN_KEY }}
  FMP_KEY: ${{ secrets.FMP_KEY }}

jobs:
  # ─────────────────────────────────────────
  # STAGE 1: Data Pipeline (~2 min cached, ~20 min cold)
  # ─────────────────────────────────────────
  data:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: drop-score-data-v3-${{ github.run_number }}
          restore-keys: |
            drop-score-data-v3-
            drop-score-data-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data pipeline
        run: python run_data.py

      - name: Upload data bundle
        uses: actions/upload-artifact@v4
        with:
          name: data-bundle
          path: |
            data/data_bundle.pkl
          retention-days: 1
          compression-level: 6

      - name: Upload data logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-logs
          path: results/data_*.txt
          retention-days: 7

  # ─────────────────────────────────────────
  # STAGE 2: Validate Universe A (~5 min)
  # ─────────────────────────────────────────
  validate:
    needs: data
    if: ${{ !inputs.skip_validate }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download data bundle
        uses: actions/download-artifact@v4
        with:
          name: data-bundle
          path: data/

      - name: Validate Universe A
        run: python run_validate.py

      - name: Upload validation results
        uses: actions/upload-artifact@v4
        with:
          name: validate-results
          path: data/validate_results.pkl
          retention-days: 1

      - name: Upload validate logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validate-logs
          path: results/validate_*.txt
          retention-days: 7

  # ─────────────────────────────────────────
  # STAGE 3: Model Universe B (~15 min)
  # ─────────────────────────────────────────
  model:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download data bundle
        uses: actions/download-artifact@v4
        with:
          name: data-bundle
          path: data/

      - name: Download validation results
        uses: actions/download-artifact@v4
        with:
          name: validate-results
          path: data/

      - name: Run model
        run: python run_model.py

      - name: Combine results
        if: always()
        run: |
          # Collect all logs into latest.txt
          cd results
          LATEST=$(ls -t *.txt 2>/dev/null | head -1)
          if [ -n "$LATEST" ]; then
            cp "$LATEST" latest.txt
          fi

      - name: Save results to repo
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add -f results/latest.txt 2>/dev/null || true
          git diff --cached --quiet || git commit -m "results: $(date -u +%Y-%m-%d)" && git push || true

      - name: Share results
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(ls -t results/*.txt 2>/dev/null | head -1)
          if [ -f "$LATEST" ]; then
            URL=$(gh gist create "$LATEST" --public 2>&1 | tail -1)
            echo "RESULTS: $URL"
          fi

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.sha }}
          path: results/
          retention-days: 30

  # ─────────────────────────────────────────
  # STAGE 4: Deep Analysis (~50-75 min)
  # ─────────────────────────────────────────
  analysis:
    needs: model
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Restore data cache
        uses: actions/cache@v4
        with:
          path: data/
          key: drop-score-data-v3-${{ github.run_number }}
          restore-keys: |
            drop-score-data-v3-
            drop-score-data-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download data bundle
        uses: actions/download-artifact@v4
        with:
          name: data-bundle
          path: data/

      - name: Run deep analysis
        run: python run_analysis.py

      - name: Upload analysis logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: analysis-logs
          path: results/analysis_*.txt
          retention-days: 30
