name: Run Drop Score v18

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      SIMFIN_KEY: ${{ secrets.SIMFIN_KEY }}
      FMP_KEY: ${{ secrets.FMP_KEY }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache data directory
        uses: actions/cache@v4
        with:
          path: data/
          key: drop-score-data-${{ hashFiles('data.py') }}
          restore-keys: |
            drop-score-data-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run main.py
        run: python main.py

      - name: Save results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          LATEST=$(ls -t results/*.txt | head -1)
          cp "$LATEST" results/latest.txt
          git add -f results/latest.txt
          git diff --cached --quiet || git commit -m "results: $(date -u +%Y-%m-%d)" && git push
        if: always()

      - name: Share results
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          LATEST=$(ls -t results/*.txt | head -1)
          if [ -f "$LATEST" ]; then
            URL=$(gh gist create "$LATEST" --public 2>&1 | tail -1)
            echo "📋 RESULTS: $URL"
          fi
        if: always()

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ github.sha }}
          path: results/
